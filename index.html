<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WordQuest - 词境历险</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="src/styles/main.css?v=20260226e">
</head>
<body>
  <div id="app">
    <!-- 场景内容将由 JS 动态渲染 -->
    <div class="flex items-center justify-center h-full">
      <div class="text-center">
        <div class="loader mx-auto mb-4"></div>
        <p class="text-gray-500">Loading WordQuest...</p>
      </div>
    </div>
  </div>

  <!-- 全局加载器 -->
  <div id="global-loader" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-xl p-6 flex flex-col items-center">
      <div class="loader mb-3"></div>
      <span class="text-gray-600 loader-message">Loading...</span>
    </div>
  </div>

  <!-- 单词释义弹窗 -->
  <div id="word-tooltip" class="word-tooltip hidden"></div>

  <!-- 全局错误捕获（开发调试用） -->
  <div id="error-overlay" style="display:none;position:fixed;inset:0;background:#fee;z-index:9999;overflow:auto;padding:16px;font-family:monospace;font-size:13px;color:#c00;"></div>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      var el = document.getElementById('error-overlay');
      el.style.display = 'block';
      el.innerHTML += '<b>错误：</b>' + msg + '<br><b>文件：</b>' + src + '  第' + line + '行<br><br>';
      return false;
    };
    window.addEventListener('unhandledrejection', function(e) {
      var el = document.getElementById('error-overlay');
      el.style.display = 'block';
      el.innerHTML += '<b>Promise 错误：</b>' + (e.reason?.message || e.reason) + '<br><br>';
    });
  </script>

  <!-- ==================== 配置文件 ==================== -->
  <script src="src/config/mock.config.js?v=20260226e"></script>
  <script src="src/config/maps.config.js?v=20260226e"></script>
  <script src="src/config/npcs.config.js?v=20260226e"></script>
  <script src="src/config/dictionary.js?v=20260226e"></script>
  <script src="src/config/ai.env.js?v=20260226e"></script>
  <script src="src/config/ai.config.js?v=20260226e"></script>

  <!-- ==================== 核心框架 ==================== -->
  <script src="src/core/eventbus.js?v=20260226e"></script>
  <script src="src/core/store.js?v=20260226e"></script>
  <script src="src/core/router.js?v=20260226e"></script>

  <!-- ==================== 共享模块 ==================== -->
  <script src="src/shared/ui.js?v=20260226e"></script>
  <script src="src/shared/api.js?v=20260226e"></script>

  <!-- ==================== 功能模块 ==================== -->
  <script src="src/modules/auth/index.js?v=20260226e"></script>
  <script src="src/modules/wordbook/index.js?v=20260226e"></script>
  <script src="src/modules/story/index.js?v=20260226e"></script>
  <script src="src/modules/game/index.js?v=20260226e"></script>
  <script src="src/modules/result/index.js?v=20260226e"></script>
  <script src="src/modules/map-editor/index.js?v=20260226e"></script>
  <script src="src/modules/admin/index.js?v=20260226e"></script>

  <!-- ==================== 应用入口 ==================== -->
  <script src="src/core/app.js?v=20260226e"></script>
</body>
</html>
